<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>First storage data backend.</title><style> * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: rgba(0, 0, 0, 0); } body { background: linear-gradient(135deg, #6a11cb, #2575fc); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; padding: 20px; position: relative; transform: scale(0.75); transform-origin: center center; } .container { text-align: center; max-width: 420px; width: 100%; } .login-card { background: rgba(255, 255, 255, .15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, .2); border-radius: 16px; padding: 30px 25px; margin: 16px 0; color: #fff; } .login-card h3 { font-size: 18px; margin-bottom: 20px; font-weight: 600; } .input-group { margin-bottom: 16px; text-align: left; } .input-group label { display: block; font-size: 13px; margin-bottom: 6px; opacity: .9; } .input-group input { width: 100%; padding: 14px 16px; border: 1px solid rgba(255, 255, 255, .3); border-radius: 12px; background: rgba(255, 255, 255, .1); color: #fff; font-size: 15px; outline: none; transition: all .3s ease; } .input-group input::placeholder { color: rgba(255, 255, 255, .5); } .input-group input:focus { border-color: rgba(255, 255, 255, .6); background: rgba(255, 255, 255, .2); } .remember-box { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; text-align: left; cursor: pointer; user-select: none; } .remember-box input[type="checkbox"] { display: none; } .remember-box .checkbox-frame { width: 18px; height: 18px; border: 1.5px solid rgba(255, 255, 255, .6); border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all .2s ease; flex-shrink: 0; } .remember-box .checkbox-frame svg { width: 12px; height: 12px; stroke: #6a11cb; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transition: opacity .2s ease; } .remember-box input[type="checkbox"]:checked + .checkbox-frame { background: #fff; border-color: #fff; } .remember-box input[type="checkbox"]:checked + .checkbox-frame svg { opacity: 1; } .remember-box span { font-size: 13px; color: rgba(255, 255, 255, .85); } .btn { background: #fff; color: #6a11cb; border: none; padding: 16px 40px; border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 10px 30px rgba(0, 0, 0, .2); transition: all .3s ease; width: 100%; } .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 0, 0, .3); } .btn:active { transform: translateY(0); } .error-msg { color: #ff6b6b; font-size: 13px; margin-top: 12px; min-height: 20px; opacity: 0; transition: opacity .3s ease; } .error-msg.show { opacity: 1; } .footer { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: rgba(255, 255, 255, .7); font-size: 12px; } .decor { position: absolute; top: 10%; left: 10%; width: 120px; height: 120px; background: rgba(255, 255, 255, .1); border-radius: 50%; } .decor2 { position: absolute; bottom: 15%; right: 12%; width: 90px; height: 90px; background: rgba(255, 255, 255, .08); border-radius: 50%; } </style></head><body><div class="decor"></div><div class="decor2"></div><div class="container"><div class="login-card"><h3>管理员登录</h3><div class="input-group"><label for="username">账户</label><input type="text" id="username" placeholder="Account" autocomplete="off"></div><div class="input-group"><label for="password">密码</label><input type="password" id="password" placeholder="Password"></div><label class="remember-box" for="remember"><input type="checkbox" id="remember"><span class="checkbox-frame"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></span><span>保存账号密码*</span></label><button class="btn" onclick="handleLogin()">登录</button><div class="error-msg" id="errorMsg">账号或密码错误</div></div></div><div class="footer">©2025 郑州网络科技 版权所有，盗版必究</div><script> const STORAGE_KEY = 'admin_login_data'; window.addEventListener('DOMContentLoaded', function() { const saved = localStorage.getItem(STORAGE_KEY); if (saved) { try { const data = JSON.parse(saved); document.getElementById('username').value = data.username || ''; document.getElementById('password').value = data.password || ''; document.getElementById('remember').checked = true; } catch (e) { localStorage.removeItem(STORAGE_KEY); } } }); document.getElementById('remember').addEventListener('change', function() { if (!this.checked) { localStorage.removeItem(STORAGE_KEY); } }); function handleLogin() { const username = document.getElementById('username').value.trim(); const password = document.getElementById('password').value.trim(); const remember = document.getElementById('remember').checked; const errorMsg = document.getElementById('errorMsg'); if (remember) { localStorage.setItem(STORAGE_KEY, JSON.stringify({ username: username, password: password })); } else { localStorage.removeItem(STORAGE_KEY); } if (username === 'admin' && password === '123456') { window.location.href = 'https://eclik.cn/zyj/pic.html?id=18513d1fd19f4b119f42c3ad9b24d80c'; } else { errorMsg.classList.add('show'); setTimeout(() => { errorMsg.classList.remove('show'); }, 3000); } } document.getElementById('password').addEventListener('keypress', function(e) { if (e.key === 'Enter') { handleLogin(); } }); document.getElementById('username').addEventListener('keypress', function(e) { if (e.key === 'Enter') { document.getElementById('password').focus(); } }); </script></body></html>
